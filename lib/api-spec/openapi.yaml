openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Aegis Health API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: diseases
    description: Disease information and analysis
  - name: symptoms
    description: Symptom checking
  - name: bmi
    description: BMI calculator
  - name: openai
    description: OpenAI AI chat, image, and audio operations
  - name: diet
    description: Food and diet guide for diseases and conditions.
  - name: history
    description: User health history tracking.
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /diseases/analyze:
    post:
      operationId: analyzeDisease
      tags: [diseases]
      summary: Analyze a disease or condition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiseaseAnalysisInput"
      responses:
        "200":
          description: Detailed disease analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiseaseAnalysis"

  /diseases/popular:
    get:
      operationId: getPopularDiseases
      tags: [diseases]
      summary: Get list of common diseases
      responses:
        "200":
          description: List of popular diseases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PopularDisease"

  /symptoms/check:
    post:
      operationId: checkSymptoms
      tags: [symptoms]
      summary: Check symptoms and get possible conditions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SymptomCheckInput"
      responses:
        "200":
          description: Possible conditions based on symptoms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SymptomCheckResult"

  /bmi/calculate:
    post:
      operationId: calculateBmi
      tags: [bmi]
      summary: Calculate BMI and get health assessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BmiInput"
      responses:
        "200":
          description: BMI result with health assessment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BmiResult"

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"

  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"

  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiMessageInput"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}

  /openai/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [openai]
      summary: Send a voice message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenaiVoiceMessageInput"
      responses:
        "200":
          description: SSE stream with transcript and assistant response chunks
          content:
            text/event-stream: {}

  /diet/analyze:
    post:
      operationId: analyzeDiet
      tags: [diet]
      summary: Get personalized food and diet guide for a condition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DietQuery'
      responses:
        '200':
          description: Diet guide
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DietGuide'

  /history/summary:
    get:
      operationId: getHealthSummary
      tags: [history]
      summary: Get an AI-generated weekly health summary for the user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: AI health summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSummary'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /history:
    get:
      operationId: getUserHealthHistory
      tags: [history]
      summary: Get the authenticated user's health history
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: List of health history items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HealthHistoryItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /history/{id}:
    delete:
      operationId: deleteHealthHistoryItem
      tags: [history]
      summary: Delete a health history item
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          description: Relative path to redirect to after login (must start with `/`). Defaults to `/`.
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the `returnTo` path on success (defaults to `/`) or `/api/login` on failure.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    DiseaseAnalysisInput:
      type: object
      properties:
        query:
          type: string
          description: Disease name or description to analyze
        imageBase64:
          type: ["string", "null"]
          description: Optional single base64-encoded medical image (legacy)
        imagesBase64:
          type: ["array", "null"]
          description: Optional array of base64-encoded medical images (prescriptions, disease photos, lab results)
          items:
            type: string
      required:
        - query

    DiseaseAnalysis:
      type: object
      properties:
        name:
          type: string
        overview:
          type: string
        causes:
          type: array
          items:
            type: string
        symptoms:
          type: array
          items:
            type: string
        foodsToEat:
          type: array
          items:
            type: string
        foodsToAvoid:
          type: array
          items:
            type: string
        medicines:
          type: array
          items:
            $ref: "#/components/schemas/Medicine"
        treatments:
          type: array
          items:
            $ref: "#/components/schemas/Treatment"
        earlyDetection:
          type: array
          items:
            type: string
        urgencyLevel:
          type: string
          enum: [low, medium, high]
        disclaimer:
          type: string
      required:
        - name
        - overview
        - causes
        - symptoms
        - foodsToEat
        - foodsToAvoid
        - medicines
        - treatments
        - earlyDetection
        - urgencyLevel
        - disclaimer

    Medicine:
      type: object
      properties:
        name:
          type: string
        dosage:
          type: string
        purpose:
          type: string
        type:
          type: string
          enum: [OTC, prescription]
        warnings:
          type: string
      required:
        - name
        - dosage
        - purpose
        - type
        - warnings

    Treatment:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [medical, lifestyle, diet, natural]
        description:
          type: string
      required:
        - name
        - type
        - description

    PopularDisease:
      type: object
      properties:
        name:
          type: string
        category:
          type: string
        description:
          type: string
      required:
        - name
        - category
        - description

    SymptomCheckInput:
      type: object
      properties:
        symptoms:
          type: array
          items:
            type: string
        additionalInfo:
          type: ["string", "null"]
      required:
        - symptoms

    SymptomCheckResult:
      type: object
      properties:
        possibleConditions:
          type: array
          items:
            $ref: "#/components/schemas/PossibleCondition"
        urgencyLevel:
          type: string
          enum: [low, medium, high, emergency]
        recommendations:
          type: array
          items:
            type: string
        disclaimer:
          type: string
      required:
        - possibleConditions
        - urgencyLevel
        - recommendations
        - disclaimer

    PossibleCondition:
      type: object
      properties:
        name:
          type: string
        probability:
          type: string
          enum: [low, moderate, high]
        description:
          type: string
        nextSteps:
          type: array
          items:
            type: string
      required:
        - name
        - probability
        - description
        - nextSteps

    BmiInput:
      type: object
      properties:
        weight:
          type: number
          description: Weight in kilograms
        height:
          type: number
          description: Height in centimeters
        age:
          type: ["integer", "null"]
        gender:
          type: ["string", "null"]
          enum: [male, female, null]
      required:
        - weight
        - height

    BmiResult:
      type: object
      properties:
        bmi:
          type: number
        category:
          type: string
        riskLevel:
          type: string
        advice:
          type: string
        dietTips:
          type: array
          items:
            type: string
        exerciseTips:
          type: array
          items:
            type: string
      required:
        - bmi
        - category
        - riskLevel
        - advice
        - dietTips
        - exerciseTips

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt

    OpenaiConversationInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title

    OpenaiMessageInput:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    OpenaiVoiceMessageInput:
      type: object
      properties:
        audioBase64:
          type: string
          description: Base64-encoded audio recording
        format:
          type: ["string", "null"]
          description: Audio format hint (webm, mp4, wav, ogg, etc)
      required:
        - audioBase64

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages

    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    DietQuery:
      type: object
      required: [query]
      properties:
        query:
          type: string

    DietFoodItem:
      type: object
      required: [name, reason, examples, emoji, impact]
      properties:
        name:
          type: string
        reason:
          type: string
        examples:
          type: array
          items:
            type: string
        emoji:
          type: string
        impact:
          type: string

    DietAvoidItem:
      type: object
      required: [name, reason, examples, emoji, severity]
      properties:
        name:
          type: string
        reason:
          type: string
        examples:
          type: array
          items:
            type: string
        emoji:
          type: string
        severity:
          type: string

    DietMealPlan:
      type: object
      required: [breakfast, lunch, dinner, snacks]
      properties:
        breakfast:
          type: array
          items:
            type: string
        lunch:
          type: array
          items:
            type: string
        dinner:
          type: array
          items:
            type: string
        snacks:
          type: array
          items:
            type: string

    DietNutrient:
      type: object
      required: [name, benefit, sources, dailyAmount]
      properties:
        name:
          type: string
        benefit:
          type: string
        sources:
          type: array
          items:
            type: string
        dailyAmount:
          type: string

    DietGuide:
      type: object
      required: [condition, overview, foodsToEat, foodsToAvoid, mealPlan, keyNutrients, tips, disclaimer]
      properties:
        condition:
          type: string
        overview:
          type: string
        foodsToEat:
          type: array
          items:
            $ref: '#/components/schemas/DietFoodItem'
        foodsToAvoid:
          type: array
          items:
            $ref: '#/components/schemas/DietAvoidItem'
        mealPlan:
          $ref: '#/components/schemas/DietMealPlan'
        keyNutrients:
          type: array
          items:
            $ref: '#/components/schemas/DietNutrient'
        tips:
          type: array
          items:
            type: string
        disclaimer:
          type: string

    HealthSummary:
      type: object
      required: [summary, insights, recommendations, generatedAt]
      properties:
        summary:
          type: string
        insights:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
        generatedAt:
          type: string
          format: date-time

    HealthHistoryItem:
      type: object
      required: [id, userId, type, query, createdAt, resultJson]
      properties:
        id:
          type: integer
        userId:
          type: string
        type:
          type: string
          enum: [disease, symptom, bmi]
        query:
          type: string
        summary:
          type: [string, 'null']
        resultJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time

    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
